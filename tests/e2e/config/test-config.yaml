mixed-port: 7890
mode: global
log-level: debug
allow-lan: false
external-controller: 127.0.0.1:9090

geo-auto-update: false

dns:
  enable: true
  ipv6: false
  listen: 127.0.0.1:1053
  enhanced-mode: redir-host
  nameserver:
    - 8.8.8.8
    - 1.1.1.1

proxies:
  - name: e2e-trojan
    type: trojan
    server: __HOST_IP__
    port: 18388
    password: e2e-test-password
    udp: true
    skip-cert-verify: true

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - e2e-trojan
  - name: GLOBAL
    type: select
    proxies:
      - e2e-trojan

rules:
  - MATCH,e2e-trojan
